name: Extract Version
description: Extract version from git tag or package.json and compute version code

inputs:
  working-directory:
    description: Working directory containing package.json
    required: false
    default: '.'

outputs:
  version:
    description: Semantic version string (e.g. 1.2.3)
    value: ${{ steps.version.outputs.version }}
  version-code:
    description: Integer version code (MAJOR*1000000 + MINOR*1000 + PATCH)
    value: ${{ steps.version.outputs.version_code }}
  version-name:
    description: Version name with v prefix (e.g. v1.2.3)
    value: ${{ steps.version.outputs.version_name }}

runs:
  using: composite
  steps:
    - name: Extract version
      id: version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Try git tag first, then package.json
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION=$(node -p "require('./package.json').version")
        fi

        # Parse semver components
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)

        # Compute integer version code
        VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "version_name=v$VERSION" >> $GITHUB_OUTPUT

        echo "Version: $VERSION"
        echo "Version code: $VERSION_CODE"
