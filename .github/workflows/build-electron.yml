name: Build Electron Desktop

on:
  workflow_call:
    inputs:
      app-name:
        description: Application name for artifacts
        required: true
        type: string
      platforms:
        description: Comma-separated platforms to build (linux,win,mac)
        required: false
        type: string
        default: linux,win,mac
      cdn-path:
        description: CDN upload path prefix (e.g. wattoshi-desktop)
        required: false
        type: string
        default: ''
      upload-to-cdn:
        description: Whether to upload to Bunny CDN
        required: false
        type: boolean
        default: true
      create-github-release:
        description: Whether to create a GitHub Release
        required: false
        type: boolean
        default: true
      node-version:
        description: Node.js version
        required: false
        type: string
        default: '20'
      build-command:
        description: Command to build the web app for Electron
        required: false
        type: string
        default: npm run build:electron-web
    secrets:
      MAC_CERTIFICATE_BASE64:
        required: false
      MAC_CERTIFICATE_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      BUNNY_API_KEY:
        required: false
      BUNNY_STORAGE_ZONE:
        required: false
      VITE_BASE_URL:
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    if: contains(inputs.platforms, matrix.platform)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app for Electron
        run: ${{ inputs.build-command }}
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --arm64 --x64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.snap
            release/latest-linux.yml
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: ignore
          retention-days: 1

  upload-to-cdn:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.upload-to-cdn && inputs.cdn-path != '' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload to Bunny.net CDN
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          UPLOAD_PATH="${{ inputs.cdn-path }}/v${VERSION}"
          LATEST_PATH="${{ inputs.cdn-path }}/latest"

          upload_file() {
            local file=$1
            local path=$2
            local filename=$(basename "$file")

            case "$filename" in
              *.yml) CONTENT_TYPE="application/x-yaml" ;;
              *.zip) CONTENT_TYPE="application/zip" ;;
              *) CONTENT_TYPE="application/octet-stream" ;;
            esac

            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "https://se.storage.bunnycdn.com/${BUNNY_STORAGE_ZONE}/${path}/${filename}" \
              -H "AccessKey: ${BUNNY_API_KEY}" \
              -H "Content-Type: ${CONTENT_TYPE}" \
              --data-binary "@${file}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "  -> $filename uploaded to $path (HTTP $HTTP_CODE)"
            else
              echo "  -> FAILED $filename to $path (HTTP $HTTP_CODE)"
              return 1
            fi
          }

          for dir in artifacts/linux-build artifacts/windows-build artifacts/macos-build; do
            if [ -d "$dir" ]; then
              for file in "$dir"/*; do
                if [ -f "$file" ]; then
                  upload_file "$file" "$UPLOAD_PATH"
                  upload_file "$file" "$LATEST_PATH"
                fi
              done
            fi
          done

          # Create and upload version manifest
          cat > manifest.json << EOF
          {
            "version": "${VERSION}",
            "releaseDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "app": "${{ inputs.app-name }}"
          }
          EOF

          upload_file "manifest.json" "$UPLOAD_PATH"
          upload_file "manifest.json" "$LATEST_PATH"

          echo "Upload complete!"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.create-github-release && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: [upload-to-cdn, release]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Delete build artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            linux-build
            windows-build
            macos-build
          failOnError: false
